name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Debug GitHub context
      run: |
        echo "GITHUB_ACTOR=$GITHUB_ACTOR"
        echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
        echo "If this run is triggered by a forked PR, the GITHUB_TOKEN cannot push to this repository."

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore "CulversQRCodeScanner.csproj"

    - name: Build project
      run: dotnet build "CulversQRCodeScanner.csproj" --configuration Release --no-restore

    - name: Publish project
      run: dotnet publish "CulversQRCodeScanner.csproj" --configuration Release --no-restore --output ./publish

    - name: Show publish output
      run: |
        echo "Publish directory contents:"
        ls -la ./publish || true
        echo "Publish/wwwroot contents:"
        ls -la ./publish/wwwroot || true

    - name: Show which token will be used
      run: |
        if [ -n "${{ secrets.GH_PAGES_PAT }}" ]; then echo "Using GH_PAGES_PAT for pages publish"; else echo "Using GITHUB_TOKEN for pages publish"; fi

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        # Prefer a user-provided PAT for pushes from forks or restricted runs; fall back to GITHUB_TOKEN
        github_token: ${{ secrets.GH_PAGES_PAT != '' && secrets.GH_PAGES_PAT || secrets.GITHUB_TOKEN }}
        publish_dir: ./publish/wwwroot
        publish_branch: gh-pages
        user_name: github-actions
        user_email: github-actions@github.com
        allow_empty_commit: true
