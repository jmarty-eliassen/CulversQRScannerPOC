name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore "CulversQRCodeScanner.csproj"

    - name: Build project
      run: dotnet build "CulversQRCodeScanner.csproj" --configuration Release --no-restore

    - name: Publish project
      run: dotnet publish "CulversQRCodeScanner.csproj" --configuration Release --no-restore --output ./publish

    - name: Show publish output
      run: |
        echo "Publish directory contents:"
        ls -la ./publish || true
        echo "Publish/wwwroot contents:"
        ls -la ./publish/wwwroot || true

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./publish/wwwroot
        publish_branch: gh-pages
        user_name: github-actions
        user_email: github-actions@github.com
        allow_empty_commit: true
